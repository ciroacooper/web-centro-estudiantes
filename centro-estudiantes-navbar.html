<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro de Estudiantes — Navbar</title>
  <style>
    /* ========== Tokens ========== */
    :root {
      --bg: #0d0d0d;
      --bg-elevated: #161616;
      --border-soft: rgba(255, 255, 255, 0.12);
      --text-muted: #a1a1aa;
      --text: #fafafa;
      --accent: #00c9a7;
      --accent-text: #0a0a0a;
      --nav-h: 64px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --loop-dur: 2800ms;
      --stagger: 85ms;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
    }

    /* ========== Keyframes — loop (match reference) ==========
       0% hidden | ~18% visible | hold to ~75% | fade ~90–100% | reset */
    @keyframes navPillLoop {
      0% {
        opacity: 0;
        transform: translateX(-32px);
      }
      18% {
        opacity: 1;
        transform: translateX(0);
      }
      75% {
        opacity: 1;
        transform: translateX(0);
      }
      90% {
        opacity: 0;
        transform: translateX(-8px);
      }
      100% {
        opacity: 0;
        transform: translateX(-32px);
      }
    }

    /* ========== Header ========== */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1rem;
      min-height: var(--nav-h);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* Circular hamburger — left */
    .nav-toggle {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      padding: 0;
      border: 1px solid var(--border-soft);
      border-radius: 50%;
      background: var(--bg-elevated);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s var(--ease), transform 0.2s var(--ease);
    }
    .nav-toggle:hover {
      border-color: rgba(0, 201, 167, 0.45);
      transform: scale(1.03);
    }
    .nav-toggle-bars {
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 18px;
    }
    .nav-toggle-bar {
      height: 2px;
      width: 100%;
      background: currentColor;
      border-radius: 1px;
      transition: transform 0.25s var(--ease), opacity 0.2s;
    }
    .nav-toggle[aria-expanded="true"] .nav-toggle-bar:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    .nav-toggle[aria-expanded="true"] .nav-toggle-bar:nth-child(2) {
      opacity: 0;
    }
    .nav-toggle[aria-expanded="true"] .nav-toggle-bar:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* Nav pills — center / grow */
    .nav-primary {
      display: flex;
      flex: 1;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      min-width: 0;
    }

    .nav-pill {
      display: inline-flex;
      align-items: center;
      padding: 0.42rem 0.95rem;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: 9999px;
      border: 1px solid var(--border-soft);
      color: var(--text-muted);
      background: transparent;
      white-space: nowrap;
      will-change: transform, opacity;
      animation: navPillLoop var(--loop-dur) var(--ease) infinite;
      animation-delay: var(--nav-delay, 0ms);
      transition: border-color 0.2s, color 0.2s;
    }

    /* Active — Inicio */
    .nav-pill.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-text);
      font-weight: 600;
    }

    /* Stagger classes (0, 85, 170, …) */
    .nav-pill--d0 { --nav-delay: 0ms; }
    .nav-pill--d1 { --nav-delay: 85ms; }
    .nav-pill--d2 { --nav-delay: 170ms; }
    .nav-pill--d3 { --nav-delay: 255ms; }
    .nav-pill--d4 { --nav-delay: 340ms; }
    .nav-pill--d5 { --nav-delay: 425ms; }
    .nav-pill--d6 { --nav-delay: 510ms; }

    .nav-pill:hover {
      border-color: rgba(0, 201, 167, 0.35);
      color: var(--text);
      animation-play-state: paused;
      opacity: 1 !important;
      transform: translateX(0) !important;
    }

    /* Theme toggle — end */
    .theme-switch {
      flex-shrink: 0;
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.35rem 0.2rem 0.45rem;
      border: 1px solid var(--border-soft);
      border-radius: 9999px;
      background: var(--bg-elevated);
      cursor: pointer;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: border-color 0.2s, color 0.2s;
    }
    .theme-switch:hover {
      border-color: rgba(0, 201, 167, 0.4);
      color: var(--text);
    }
    .theme-knob {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      transition: transform 0.3s var(--ease);
    }
    :root.light .theme-knob {
      transform: translateX(18px);
    }

    :root.light {
      --bg: #f4f4f5;
      --bg-elevated: #ffffff;
      --border-soft: rgba(0, 0, 0, 0.1);
      --text-muted: #52525b;
      --text: #18181b;
    }
    :root.light .site-header {
      border-bottom-color: rgba(0, 0, 0, 0.08);
    }
    :root.light .nav-toggle {
      background: #fff;
      color: var(--text);
    }

    /* Escritorio: barra completa; móvil: hamburguesa */
    @media (min-width: 901px) {
      .nav-toggle {
        display: none;
      }
    }

    /* ========== Mobile drawer ========== */
    @media (max-width: 900px) {
      .nav-toggle {
        display: inline-flex;
      }
      .nav-primary {
        position: fixed;
        top: var(--nav-h);
        left: 0;
        right: 0;
        flex-direction: column;
        align-items: stretch;
        padding: 1rem;
        gap: 0.35rem;
        background: var(--bg-elevated);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        visibility: hidden;
        transition: max-height 0.35s var(--ease), opacity 0.25s, visibility 0.35s;
      }
      .nav-primary.is-open {
        max-height: 520px;
        opacity: 1;
        visibility: visible;
      }
      .nav-pill {
        justify-content: center;
      }
    }

    /* Demo content */
    .demo {
      max-width: 720px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .demo h1 {
      color: var(--text);
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
    }

    @media (prefers-reduced-motion: reduce) {
      .nav-pill {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <button
        type="button"
        class="nav-toggle"
        id="nav-toggle"
        aria-expanded="false"
        aria-controls="nav-primary"
        aria-label="Abrir menú"
      >
        <span class="nav-toggle-bars" aria-hidden="true">
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
        </span>
      </button>

      <nav class="nav-primary" id="nav-primary" aria-label="Principal">
        <a class="nav-pill nav-pill--d0 is-active" href="#inicio">Inicio</a>
        <a class="nav-pill nav-pill--d1" href="#explorar">Explorar</a>
        <a class="nav-pill nav-pill--d2" href="#enviar">Enviar idea</a>
        <a class="nav-pill nav-pill--d3" href="#reportar">Reportar problema</a>
        <a class="nav-pill nav-pill--d4" href="#proyectos">Proyectos</a>
        <a class="nav-pill nav-pill--d5" href="#descargar">Descargar app</a>
        <a class="nav-pill nav-pill--d6" href="#contacto">Contacto</a>
      </nav>

      <button type="button" class="theme-switch" id="theme-toggle" aria-pressed="false" aria-label="Cambiar tema">
        <span>Tema</span>
        <span class="theme-knob" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <main class="demo" id="inicio">
    <h1>Centro de Estudiantes</h1>
    <p>
      Navbar con animación en bucle (2800 ms, escalonado 85 ms). Las píldoras usan solo CSS;
      el menú hamburguesa en pantallas pequeñas usa un script mínimo.
    </p>
  </main>

  <script>
    (function () {
      var mq = window.matchMedia('(max-width: 900px)');
      var nav = document.getElementById('nav-primary');
      var btn = document.getElementById('nav-toggle');
      var root = document.documentElement;
      var toggle = document.getElementById('theme-toggle');

      function setOpen(open) {
        if (!nav || !btn) return;
        nav.classList.toggle('is-open', open);
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        btn.setAttribute('aria-label', open ? 'Cerrar menú' : 'Abrir menú');
      }

      if (btn && nav) {
        btn.addEventListener('click', function () {
          setOpen(!nav.classList.contains('is-open'));
        });
      }

      window.addEventListener('resize', function () {
        if (!mq.matches) setOpen(false);
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') setOpen(false);
      });

      nav &&
        nav.querySelectorAll('a').forEach(function (a) {
          a.addEventListener('click', function () {
            if (mq.matches) setOpen(false);
          });
        });

      if (toggle) {
        toggle.addEventListener('click', function () {
          var light = !root.classList.contains('light');
          root.classList.toggle('light', light);
          toggle.setAttribute('aria-pressed', light ? 'true' : 'false');
        });
      }
    })();
  </script>
</body>
</html>
